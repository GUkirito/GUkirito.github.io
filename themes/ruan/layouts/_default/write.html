<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - AI 学习笔记</title>
  <link rel="stylesheet" href="{{ "/css/style.css" | relURL }}">
  <style>
    .write-page { max-width: 720px; margin: 40px auto; padding: 0 20px; }
    .write-page h1 { font-weight: normal; font-size: 1.6rem; margin-bottom: 8px; color: #111; }
    .write-page .hint { color: #999; font-size: 0.85rem; margin-bottom: 24px; }
    .write-page .hint a { color: #0366d6; }
    .write-page label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #555; }
    .write-page input,
    .write-page textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 0.95rem; font-family: inherit; margin-bottom: 16px; box-sizing: border-box;
    }
    .write-page input:focus,
    .write-page textarea:focus { outline: none; border-color: #666; }
    .write-page textarea { min-height: 400px; line-height: 1.8; resize: vertical; }
    .write-page button {
      background: #222; color: #fff; padding: 12px 32px; border: none;
      border-radius: 4px; font-size: 1rem; cursor: pointer;
    }
    .write-page button:hover { background: #444; }
    .write-page button:disabled { background: #ccc; cursor: not-allowed; }
    .write-page .msg { margin-top: 12px; font-size: 0.9rem; }
    .write-page .msg.success { color: #2a7d2a; }
    .write-page .msg.error { color: #c00; }
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title"><a href="{{ "" | relURL }}">{{ .Site.Title }}</a></h1>
    <nav class="site-nav">
      <a href="{{ "" | relURL }}">← 返回首页</a>
    </nav>
  </header>

  <div class="write-page">
    <h1>写文章</h1>
    <p class="hint">
      首次使用需要
      <a href="https://github.com/settings/tokens" target="_blank">创建 GitHub Token</a>
      （勾选 repo 权限），粘贴到下方保存。之后无需重复输入。
    </p>

    <label>GitHub Token（仅首次需要）</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <button id="saveToken" onclick="saveToken()">保存 Token</button>
    <p class="msg" id="tokenMsg"></p>

    <hr style="border:none; border-top:1px solid #eee; margin: 28px 0;">

    <label>日期</label>
    <input type="date" id="dateInput">

    <label>标题</label>
    <input type="text" id="titleInput" placeholder="文章标题">

    <label>摘要（可选，显示在首页）</label>
    <input type="text" id="descInput" placeholder="一句话简介">

    <label>正文（Markdown 格式）</label>
    <textarea id="bodyInput" placeholder="> 支持 Markdown 语法&#10;&#10;## 二级标题&#10;&#10;正文内容……&#10;&#10;```python&#10;print('代码块也支持'）&#10;```"></textarea>

    <button id="publishBtn" onclick="publish()">发 布</button>
    <p class="msg" id="pubMsg"></p>
  </div>
</body>

<script>
const REPO = 'GUkirito/GUkirito.github.io';
const BRANCH = 'main';
const FOLDER = 'content/posts/';

// Init
const today = new Date().toISOString().slice(0,10);
document.getElementById('dateInput').value = today;
const saved = localStorage.getItem('gh_token');
if (saved) {
  document.getElementById('tokenInput').value = saved;
  document.getElementById('tokenMsg').textContent = 'Token 已保存 ✅';
  document.getElementById('tokenMsg').className = 'msg success';
}

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenMsg').textContent = 'Token 已保存 ✅';
  document.getElementById('tokenMsg').className = 'msg success';
}

async function publish() {
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('pubMsg');
  const token = document.getElementById('tokenInput').value.trim() || localStorage.getItem('gh_token');
  
  if (!token) { msg.textContent = '请先填写并保存 GitHub Token'; msg.className = 'msg error'; return; }

  const date = document.getElementById('dateInput').value;
  const title = document.getElementById('titleInput').value.trim();
  const desc = document.getElementById('descInput').value.trim();
  const body = document.getElementById('bodyInput').value;

  if (!title) { msg.textContent = '请输入标题'; msg.className = 'msg error'; return; }
  if (!body) { msg.textContent = '请输入正文'; msg.className = 'msg error'; return; }

  const slug = title.replace(/\s+/g, '-').replace(/[^\w\-\u4e00-\u9fff]/g, '').slice(0,40);
  const filename = date + '-' + slug + '.md';
  const frontmatter = '---\ntitle: "' + title + '"\ndate: ' + date + '\ndescription: "' + desc + '"\n---\n\n';
  const content = frontmatter + body;
  const base64 = btoa(unescape(encodeURIComponent(content)));

  btn.disabled = true;
  btn.textContent = '发布中...';
  msg.textContent = '';

  try {
    const url = 'https://api.github.com/repos/' + REPO + '/contents/' + FOLDER + filename;
    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '新文章: ' + title,
        content: base64,
        branch: BRANCH
      })
    });

    if (resp.ok) {
      msg.textContent = '发布成功！文章将在 1~2 分钟后显示在首页';
      msg.className = 'msg success';
      document.getElementById('titleInput').value = '';
      document.getElementById('descInput').value = '';
      document.getElementById('bodyInput').value = '';
    } else {
      const err = await resp.json();
      msg.textContent = '发布失败: ' + (err.message || resp.status);
      msg.className = 'msg error';
    }
  } catch (e) {
    msg.textContent = '网络错误: ' + e.message;
    msg.className = 'msg error';
  }

  btn.disabled = false;
  btn.textContent = '发 布';
}
</script>
</html>
