<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  (function() {
    var toggle = document.getElementById('themeToggle');
    var html = document.documentElement;
    var KEY = 'blog-theme';
    var mqDark = window.matchMedia('(prefers-color-scheme: dark)');

    // Always set data-theme explicitly so CSS only needs two sources of truth
    var saved = localStorage.getItem(KEY);
    if (saved === 'dark' || saved === 'light') {
      html.setAttribute('data-theme', saved);
    } else if (mqDark.matches) {
      html.setAttribute('data-theme', 'dark');
    }

    function updateIcon() {
      var isDark = html.getAttribute('data-theme') === 'dark';
      var lightIcon = document.querySelector('.icon-light');
      var darkIcon = document.querySelector('.icon-dark');
      if (lightIcon && darkIcon) {
        lightIcon.style.display = isDark ? 'inline' : 'none';
        darkIcon.style.display = isDark ? 'none' : 'inline';
      }
    }
    updateIcon();

    if (toggle) {
      toggle.addEventListener('click', function() {
        var isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem(KEY, isDark ? 'light' : 'dark');
        updateIcon();
      });
    }

    mqDark.addEventListener('change', function(e) {
      if (!localStorage.getItem(KEY)) {
        html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      }
      updateIcon();
    });
  })();
  </script>
</body>
</html>
