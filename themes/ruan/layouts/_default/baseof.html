<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <script>
    (function(){var k='blog-theme';var s=localStorage.getItem(k);var d=document.documentElement;if(s==='dark'||s==='light'){d.setAttribute('data-theme',s)}else if(window.matchMedia('(prefers-color-scheme:dark)').matches){d.setAttribute('data-theme','dark')}})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  (function() {
    var toggle = document.getElementById('themeToggle');
    var html = document.documentElement;
    var KEY = 'blog-theme';
    var mqDark = window.matchMedia('(prefers-color-scheme: dark)');

    var saved = localStorage.getItem(KEY);
    if (saved === 'dark' || saved === 'light') {
      html.setAttribute('data-theme', saved);
    } else if (mqDark.matches) {
      html.setAttribute('data-theme', 'dark');
    }

    function updateLabel() {
      var isDark = html.getAttribute('data-theme') === 'dark';
      var label = document.querySelector('.theme-toggle-label');
      if (label) label.textContent = isDark ? 'Light' : 'Dark';
    }
    updateLabel();

    if (toggle) {
      toggle.addEventListener('click', function() {
        var isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem(KEY, isDark ? 'light' : 'dark');
        updateLabel();
      });
    }

    mqDark.addEventListener('change', function(e) {
      if (!localStorage.getItem(KEY)) {
        html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      }
      updateLabel();
    });
  })();
  </script>
</body>
</html>
