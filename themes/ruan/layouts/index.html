{{ define "main" }}
<ul class="post-list">
  {{ range .Site.RegularPages }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "2006年01月02日" }}</span>
    <h2 class="post-title">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
    {{ with .Description }}
    <p class="post-excerpt">{{ . }}</p>
    {{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
