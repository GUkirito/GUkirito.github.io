baseURL = 'https://GUkirito.github.io/'
languageCode = 'zh-CN'
title = 'AI 学习笔记'
theme = 'ruan'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[params]
  description = '每天学一点 AI，记录思考与成长'
  author = 'GUkirito'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]

[outputFormats.SearchIndex]
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true

[permalinks]
  posts = '/:contentbasename/'
  categories = '/categories/:slug/'
  tags = '/tags/:slug/'
  series = '/series/:slug/'
